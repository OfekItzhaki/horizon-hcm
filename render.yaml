services:
  # Backend NestJS API — uses your single free service slot
  - type: web
    name: horizon-hcm-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps --include=optional && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false  # Supabase connection string — set in Render dashboard
      - key: REDIS_URL
        sync: false  # Upstash Redis URL (rediss://...) — set in Render dashboard
      - key: JWT_PRIVATE_KEY
        sync: false  # Copy from backend/.env — set in Render dashboard
      - key: JWT_PUBLIC_KEY
        sync: false  # Copy from backend/.env — set in Render dashboard
      - key: AUTH_MODE
        value: full
      - key: CACHE_NAMESPACE
        value: horizon-hcm
      - key: ENABLE_2FA
        value: false
      - key: ENABLE_DEVICE_MGMT
        value: false
      - key: ENABLE_PUSH
        value: false
      - key: ENABLE_ACCOUNT_MGMT
        value: true
      - key: ALLOW_REACTIVATION
        value: true
      - key: ALLOWED_ORIGINS
        sync: false  # Your Vercel URL, e.g. https://your-app.vercel.app
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
